id: global-rules
name: Global AEOS Rules
version: 1.0.0
priority: 100

rules:
  - no_context_no_decision
  - no_permission_no_execution
  - no_evidence_no_assertion
  - no_test_no_completion
  - no_rollback_no_mutation
  - no_logs_no_existence
  - no_judge_no_delivery

required_evidence:
  - execution_state
  - permission_decisions
  - tool_calls
  - generated_artifacts
  - judge_report
