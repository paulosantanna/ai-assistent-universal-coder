id: python-ai
name: Python AI Context Pack
version: 1.0.0
priority: 80

applies_when:
  languages: [python]
  frameworks: [fastapi, langchain, rag]
  domains: [ai, data, scraper, training]

rules:
  - separate_data_ingestion_from_reasoning
  - require_dataset_provenance
  - require_eval_reports
  - distinguish_fact_from_model_output
  - block_medical_claims_without_sources
  - do_not_scrape_without_governance

required_evidence:
  - data_sources
  - dependency_report
  - eval_report
  - generated_artifacts
