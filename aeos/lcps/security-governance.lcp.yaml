id: security-governance
name: Security Governance Context Pack
version: 1.0.0
priority: 95

forbidden:
  - expose_secret_values
  - persist_tokens
  - persist_cookies
  - bypass_audit
  - direct_tool_access
  - shell_unrestricted
  - protected_branch_mutation
  - package_unverified_extract

required_evidence:
  - secret_scan_summary
  - policy_decisions
  - permission_decisions
  - redaction_report
