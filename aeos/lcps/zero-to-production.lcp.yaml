id: zero-to-production
name: Zero To Production Context Pack
version: 1.0.0
priority: 90

rules:
  - start_from_requirements_contract
  - choose_architecture_from_constraints_not_preference
  - select_language_and_database_explicitly
  - generate_scaffold_in_sandbox_first
  - require_tests_security_observability_ci_and_rollback
  - require_database_migration_and_backup_plan_when_database_exists
  - require_token_budget_before_model_or_subagent_calls
  - require_change_manifest_for_generated_files
  - require_rollback_plan_for_each_tracked_change
  - stop_on_scope_expansion

required_artifacts:
  - requirements contract
  - ADRs
  - architecture docs
  - source scaffold
  - change manifest
  - tests
  - CI pipeline
  - security scan report
  - observability plan
  - deployment plan
  - rollback plan
  - production readiness report

decision_boundaries:
  - no production mutation without approval
  - no generated architecture claim without evidence or explicit user choice
  - no token-heavy subagent delegation without expected value
  - no unsupported language/database claims without documentation MCP evidence
  - no generated or modified file without tracked before and after state
