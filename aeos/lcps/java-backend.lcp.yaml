id: java-backend
name: Java Backend Context Pack
version: 1.0.0
priority: 80

applies_when:
  languages: [java]
  build_tools: [maven, gradle]
  frameworks: [spring, jakarta, quarkus]

rules:
  - preserve_existing_architecture
  - prefer_small_diffs
  - require_tests_for_behavior_change
  - do_not_change_public_api_without_contract_test
  - do_not_upgrade_major_dependencies_without_compatibility_report

required_evidence:
  - dependency_tree
  - build_result
  - test_result
  - changed_files
  - rollback_plan
