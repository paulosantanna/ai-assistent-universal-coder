mcps:
- id: filesystem-readonly
  type: filesystem
  transport: stdio
  config: aeos/mcps/filesystem-readonly.mcp.yaml
  risk_level: low
  capabilities:
  - READ_FILES
  - LIST_DIRECTORIES
  tools:
  - filesystem.list
  - filesystem.read
  - filesystem.exists
  - filesystem.stat
  write_allowed: false
  approval_required: false
  enabled: true
- id: filesystem-write-sandbox
  type: filesystem
  transport: stdio
  config: aeos/mcps/filesystem-write-sandbox.mcp.yaml
  risk_level: medium
  capabilities:
  - WRITE_SANDBOX_FILES
  tools:
  - filesystem.write_sandbox
  - filesystem.mkdir_sandbox
  write_allowed: true
  sandbox_required: true
  approval_required: false
  enabled: true
- id: git-readonly
  type: git
  transport: stdio
  config: aeos/mcps/git-readonly.mcp.yaml
  risk_level: low
  capabilities:
  - GIT_STATUS
  - GIT_DIFF
  - GIT_LOG
  tools:
  - git.status
  - git.diff
  - git.log
  - git.branch_current
  approval_required: false
  enabled: true
- id: test-runner-controlled
  type: test-runner
  transport: stdio
  config: aeos/mcps/test-runner-controlled.mcp.yaml
  risk_level: medium
  capabilities:
  - RUN_TESTS
  tools:
  - test.detect
  - test.run_allowlisted
  approval_required: false
  allowlist_required: true
  enabled: true
- id: package-local
  type: packaging
  transport: local
  config: aeos/mcps/package-local.mcp.yaml
  risk_level: medium
  capabilities:
  - PACKAGE_CREATE
  - PACKAGE_VERIFY
  - PACKAGE_INSPECT
  - PACKAGE_EXTRACT
  tools:
  - package.create
  - package.verify
  - package.inspect
  - package.extract_staging
  approval_required: false
  enabled: true
- id: continuous-training
  type: continuous-training
  transport: stdio
  config: aeos/mcps/continuous-training.mcp.yaml
  risk_level: low
  capabilities:
  - WEB_SEARCH
  - WEB_FETCH
  - KNOWLEDGE_RETRIEVAL
  tools:
  - web_search
  - arxiv_search
  - paperswithcode_search
  - github_search
  - reddit_search
  - web_fetch
  - curated_sources
  - training_sites
  - best_practices
  - source_policy
  - source_registry_list
  - full_search
  write_allowed: false
  approval_required: false
  enabled: true
- id: secrets-runtime
  type: secrets
  transport: stdio
  config: aeos/mcps/secrets-runtime.disabled.mcp.yaml
  risk_level: critical
  capabilities:
  - READ_RUNTIME_SECRET
  approval_required: true
  enabled: false
  reason: Disabled until post-v0.6 security hardening.
