mcps:
- id: filesystem-readonly
  type: filesystem
  transport: stdio
  config: aeos/mcps/filesystem-readonly.mcp.yaml
  risk_level: low
  capabilities:
  - READ_FILES
  - LIST_DIRECTORIES
  tools:
  - filesystem.list
  - filesystem.read
  - filesystem.exists
  - filesystem.stat
  write_allowed: false
  approval_required: false
  enabled: true
- id: filesystem-write-sandbox
