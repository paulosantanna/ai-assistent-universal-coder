lcps:
  - id: global-rules
    path: aeos/lcps/global-rules.lcp.yaml
    priority: 100
    scope: global
    applies_to: [all]

  - id: security-governance
    path: aeos/lcps/security-governance.lcp.yaml
    priority: 95
    scope: global
    applies_to: [security, mcp, secrets, shell, git, packaging]

  - id: java-backend
    path: aeos/lcps/java-backend.lcp.yaml
    priority: 80
    scope: stack
    applies_to: [java, spring, maven, gradle]

  - id: python-ai
    path: aeos/lcps/python-ai.lcp.yaml
    priority: 80
    scope: stack
    applies_to: [python, fastapi, rag, training, scraper]

  - id: documentation-standards
    path: aeos/lcps/documentation-standards.lcp.yaml
    priority: 70
    scope: output
    applies_to: [documentation, adr, runbook]

  - id: packaging-standards
    path: aeos/lcps/packaging-standards.lcp.yaml
    priority: 90
    scope: packaging
    applies_to: [zip, package, export, import]

  - id: language-documentation-intelligence
    path: aeos/lcps/language-documentation-intelligence.lcp.yaml
    priority: 85
    scope: stack
    applies_to:
    - java
    - python
    - node
    - typescript
    - angular
    - javascript
    - migration
    - bug-solving
  - id: zero-to-production
    path: aeos/lcps/zero-to-production.lcp.yaml
    priority: 90
    scope: project-generation
    applies_to:
    - project-factory
    - scaffold
    - production
    - deployment
    - database
  - id: token-economy
    path: aeos/lcps/token-economy.lcp.yaml
    priority: 95
    scope: token-budget
    applies_to:
    - all
    - subagents
    - llm-calls
    - prompt-optimization
