- id: repo-scanner
  path: aeos/skills/core/repo-scanner.skill.md
  version: 1.0.0
  owner_agent: architect
  risk_level: low
  capabilities:
  - READ_REPOSITORY
  - READ_FILES
  - DETECT_STACK
  - GENERATE_REPORT
  mission: Analyze repositories and produce factual ecosystem maps.
  allowed_actions:
  - Read authorized files through Tool Router
  - Generate reports in .aeos/reports
  - Generate evidence in .aeos/evidence
  - Generate sandbox artifacts when permitted
  forbidden_actions:
  - Direct filesystem access
  - Direct Git mutation
  - Secret value exposure
  - Destructive shell
  - Unapproved writes outside .aeos
  - Unsupported factual claims
  - Silent failure
  required_inputs:
  - repository_path
  - scan_depth
  output_schema:
    type: object
    properties:
      files_inspected:
        type: array
        items:
          type: string
      tool_calls:
        type: array
        items:
          type: object
      permission_decisions:
        type: array
        items:
          type: object
      generated_artifacts:
        type: array
        items:
          type: string
      risk_classification:
        type: object
  quality_gates:
  - Facts cite evidence
  - Assumptions are explicitly marked
  - Risks are classified
  - Outputs follow schema
  - No secrets are printed
  - Required artifacts are hashed
  stop_conditions:
  - Required path not found
  - Permission denied
  - Secret detected
  - Unsupported repository format
- id: architecture-mapper
  path: aeos/skills/core/architecture-mapper.skill.md
  version: 1.0.0
  owner_agent: architect
  risk_level: medium
  capabilities:
  - READ_REPOSITORY
  - READ_FILES
  - MAP_ARCHITECTURE
  - GENERATE_REPORT
  mission: Map repository architecture, detect patterns, and report structural design.
  allowed_actions:
  - Read repository files
  - Detect architecture patterns
  - Generate architecture reports
  - Map module dependencies
  forbidden_actions:
  - Modify repository files
  - Execute arbitrary commands
  - Expose credentials
  required_inputs:
  - repository_path
  output_schema:
    type: object
    properties:
      architecture:
        type: object
      patterns:
        type: array
      dependencies:
        type: object
  quality_gates:
  - Reports cite specific files
  - Patterns are backed by evidence
  - Dependencies are verified
  stop_conditions:
  - Repository not found
  - Permission denied
- id: documentation
  path: aeos/skills/core/documentation.skill.md
  version: 1.0.0
  owner_agent: documenter
  risk_level: medium
  capabilities:
  - READ_REPOSITORY
  - READ_FILES
  - WRITE_SANDBOX_FILES
  - GENERATE_REPORT
  - DOC_GENERATION
  - MERMAID_DIAGRAMS
  mission: Generate evidence-based documentation artifacts in sandbox.
  allowed_actions:
  - Read repository files
  - Generate documentation
  - Write sandbox files
  - Request complete-docs MCP through Tool Router
  forbidden_actions:
  - Modify repository files directly
  - Execute commands on host
  - Expose sensitive information
  required_inputs:
  - source_path
  - documentation_type
  - target_audience
  - diagram_scope
  - maturity_target
  output_schema:
    type: object
    properties:
      documentation:
        type: string
      mermaid_diagrams:
        type: array
      architecture_package:
        type: object
      adr_candidates:
        type: array
      cloud_readiness:
        type: array
      evidence_refs:
        type: array
      blocking_conditions:
        type: array
  quality_gates:
  - Documentation cites sources
  - Output is well-structured
  - No sensitive data exposed
  - Complete documentation includes validated Mermaid diagrams
  - Every diagram has evidence refs or explicit assumptions
  - Mermaid diagrams contain no secrets or sensitive values
  - Architecture packages include README, ADR, skill/MCP/LSP map and cloud readiness
    gates
  stop_conditions:
  - Source path not found
  - Permission denied
  - complete-docs MCP unavailable
  - Mermaid validation returns blocking issue
- id: chromatic-mega-brain
  path: skills/chromatic-mega-brain/SKILL.md
  version: 1.0.0
  owner_agent: architect
  risk_level: high
  capabilities:
  - READ_REPOSITORY
  - READ_FILES
  - KNOWLEDGE_RETRIEVAL
  - STRATEGIC_REASONING
  - DECISION_ORCHESTRATION
  - GENERATE_REPORT
  mission: Orchestrate bounded multi-perspective analysis for high-impact architecture,
    migration, security, cloud readiness and AEOS evolution decisions.
  allowed_actions:
  - Select minimal useful cognitive colors
  - Generate chromatic handoffs
  - Generate decision matrix
  - Identify contradictions and blockers
  - Recommend Judge review for high-impact decisions
  - Read validated knowledge and memory through governed context
  forbidden_actions:
  - Activate all colors by default
  - Replace specialized skills for deterministic tasks
  - Promote raw analysis into permanent knowledge
  - Make unsupported architecture or security claims
  - Bypass Judge for high-impact decisions
  required_inputs:
  - objective
  - decision_type
  output_schema:
    type: object
    properties:
      chromatic_run:
        type: object
      selected_colors:
        type: array
      handoffs:
        type: array
      decision_matrix:
        type: array
      evidence_refs:
        type: array
      blocking_conditions:
        type: array
  quality_gates:
  - Uses the smallest useful color set
  - Separates evidence, assumptions, risks and recommendations
  - Exposes contradictions before synthesis
  - Requires Judge review for high-impact decisions
  - Does not promote lessons without validation evidence
  stop_conditions:
  - Objective missing
  - Evidence missing for high-impact architecture, migration or cloud readiness decisions
  - Specialized deterministic skill is sufficient
  - Policy or permission conflict
- id: security-audit
  path: aeos/skills/core/security-audit.skill.md
  version: 1.0.0
  owner_agent: security
  risk_level: high
  capabilities:
  - READ_REPOSITORY
  - READ_FILES
  - SCAN_SECRETS
  - SCAN_DEPENDENCIES
  - GENERATE_REPORT
  mission: Scan repositories for security risks, secrets, and dependency hazards.
  allowed_actions:
  - Scan for secrets
  - Scan dependency vulnerabilities
  - Review permission configurations
  - Generate security reports
  forbidden_actions:
  - Modify repository files
  - Expose detected secrets outside audit
  - Execute untested changes
  required_inputs:
  - repository_path
  - scan_depth
  output_schema:
    type: object
    properties:
      risks:
        type: array
      secrets_found:
        type: array
      vulnerabilities:
        type: array
      recommendations:
        type: array
  quality_gates:
  - All findings are evidence-backed
  - Risk levels are classified
  - False positives are minimized
  stop_conditions:
  - Repository not accessible
  - Scan interrupted
