id: git
transport: stdio
mode: controlled
risk_level: high

capabilities:
  - GIT_STATUS
  - GIT_DIFF
  - GIT_LOG
  - CREATE_BRANCH
  - CREATE_COMMIT
  - CREATE_PR

rules:
  readonly_allowed: true
  branch_create_allowed: true
  commit_requires_approval: true
  pr_create_requires_approval: true
  push_requires_approval: true
  merge_allowed: false
  force_push_allowed: false
  protected_branches:
    - main
    - master
    - develop
