mcp:
  id: docs-node-current
  name: Node.js Current Documentation MCP
  protocol: model-context-protocol
  version: '2026-07-12'
  transport:
    type: stdio
    command: language-docs-mcp
    args:
    - --profile
    - docs-node-current
  capabilities:
    tools:
    - name: language_docs.search
      description: Search governed language documentation for the active profile.
      security: read-only
      input:
        query: string
        max_results: integer
      output:
        type: object
    - name: language_docs.fetch
      description: Fetch and extract a governed documentation page from an allowed
        source.
      security: read-only
      input:
        url: string
        max_bytes: integer
      output:
        type: object
    - name: language_docs.lookup_symbol
      description: Look up APIs, symbols, modules, packages, flags or framework concepts
        in versioned docs.
      security: read-only
      input:
        symbol: string
        scope: string
      output:
        type: object
    - name: language_docs.version_status
      description: Return release, support and documentation status for the active
        language profile.
      security: read-only
      output:
        type: object
    - name: language_docs.migration_delta
      description: Compare source and target versions using governed docs and release
        notes.
      security: read-only
      input:
        source_version: string
        target_version: string
        topic: string
      output:
        type: object
    - name: language_docs.source_policy
      description: Return source authority, freshness and citation policy for this
        documentation MCP.
      security: read-only
      output:
        type: object
  source_profile:
    language: node
    version: current
    resolved_version: '26'
    status: current
    sources:
    - name: Node.js Documentation
      url: https://nodejs.org/api/
      authority: official
      type: api
    - name: Node.js Releases
      url: https://nodejs.org/en/about/previous-releases
      authority: official
      type: release-policy
    - name: Node.js Release Blog
      url: https://nodejs.org/en/blog/release
      authority: official
      type: release
  security:
    allowed_domains:
    - nodejs.org
    - github.com
    - api.github.com
    blocked_domains:
    - '*.malicious.*'
    - '*.phishing.*'
    - localhost
    - 127.0.0.1
    - 10.*
    - 172.16.*
    - 192.168.*
    redaction:
      enabled: true
      patterns:
      - (?i)(password|secret|token|key|credential)[=:]\s*\S+
    audit:
      log_all_fetches: true
      log_all_queries: true
prompt_contract:
  objective: Return version-specific language documentation facts from official or
    governed sources only.
  evidence_required: true
  redact_outputs: true
  tool_boundary: Route access through AEOS MCP runtime and Tool Router policy checks.
  response_rules:
  - Return evidence refs for every material language/version claim.
  - Prefer official documentation and specifications over community summaries.
  - Mark preview, deprecated, removed and implementation-specific behavior explicitly.
  - Do not expose secrets, credentials, raw tokens or sensitive values.
  stop_conditions:
  - required language or version input is missing
  - requested source is outside the allowed domain set
  - permission or policy is denied
  - evidence cannot be produced from an official or governed source
