# =============================================================================
# MCP: Secrets Runtime
# =============================================================================
# Model Context Protocol connector for resolving secrets at runtime.
# This is the most sensitive MCP - strict controls apply.
# Secrets are NEVER logged, NEVER stored, NEVER exposed in output.
# =============================================================================

mcp:
  id: secrets
  name: Secrets Runtime MCP
  protocol: model-context-protocol
  version: "2025-03-26"

  transport:
    type: stdio
    command: aeos-kernel
    args:
      - "mcp"
      - "secrets"

  capabilities:
    tools:
      - name: resolve_secret
        description: Resolve a secret value from authorized source
        security: critical
        input:
          name: string
          source: string
        output:
          type: text
        constraints:
          - approval_required: true
          - log_redaction_required: true
          - never_in_prompt: true
          - never_in_trace: true
          - never_in_report: true

  security:
    allowed_sources:
      - windows_credential_manager
      - macos_keychain
      - linux_secret_service
      - github_actions_secrets
      - vault
      - runtime_memory_only
    restrictions:
      never_log_secret_value: true
      never_write_secret_to_file: true
      never_include_in_output: true
      never_pass_to_other_tools: true
      max_uses_per_session: 10
      expire_after_use: true
    audit:
      log_access_attempt: true
      log_secret_name_only: true
      never_log_value: true
    redaction:
      enabled: true
      mask_char: "*"
      mask_all: true

prompt_contract:
  objective: "Use this MCP only for its declared capability scope."
  evidence_required: true
  redact_outputs: true
  tool_boundary: "Route access through AEOS MCP runtime and Tool Router policy checks."
  response_rules:
    - "Return evidence refs for material facts."
    - "Mark assumptions and missing inputs explicitly."
    - "Do not expose secrets, credentials, raw tokens or sensitive values."
  stop_conditions:
    - "required input is missing"
    - "permission or policy is denied"
    - "requested action exceeds MCP capability scope"
    - "output cannot be redacted safely"
