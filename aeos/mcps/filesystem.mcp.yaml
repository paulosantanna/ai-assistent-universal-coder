id: filesystem
transport: stdio
mode: controlled
risk_level: medium

capabilities:
  - READ_FILES
  - LIST_DIRECTORIES
  - WRITE_SANDBOX_FILES

rules:
  read_allowed: true
  write_allowed_only:
    - ".aeos/sandbox/**"
    - ".aeos/reports/**"
    - ".aeos/evidence/**"
    - ".aeos/patches/**"
    - ".aeos/packages/**"
  delete_allowed: false
  block_absolute_paths: true
  block_path_traversal: true
