mcp:
  id: package-local
  type: packaging
  transport: local
  command: "aeos-package"
  risk_level: medium
  timeout_seconds: 120
  retries: 0
  approval_required: false
  redaction_required: true

tools:
  - name: package.create
  - name: package.verify
  - name: package.inspect
  - name: package.extract_staging

rules:
  require_manifest: true
  require_sha256: true
  block_path_traversal: true
  block_absolute_paths: true
  block_zip_bomb: true
  block_secrets: true
  extract_requires_verify_pass: true
  extract_to_staging_only: true

prompt_contract:
  objective: "Use this MCP only for its declared capability scope."
  evidence_required: true
  redact_outputs: true
  tool_boundary: "Route access through AEOS MCP runtime and Tool Router policy checks."
  response_rules:
    - "Return evidence refs for material facts."
    - "Mark assumptions and missing inputs explicitly."
    - "Do not expose secrets, credentials, raw tokens or sensitive values."
  stop_conditions:
    - "required input is missing"
    - "permission or policy is denied"
    - "requested action exceeds MCP capability scope"
    - "output cannot be redacted safely"
