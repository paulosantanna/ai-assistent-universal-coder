policies:
  protected_branches:
    block_mutation:
      - main
      - master
      - develop

  filesystem:
    allow_write_without_approval:
      - ".aeos/sandbox/**"
      - ".aeos/reports/**"
      - ".aeos/evidence/**"
      - ".aeos/patches/**"
      - ".aeos/packages/**"
    block_delete_without_approval: true

  git:
    block_commit_without_approval: true
    block_push_without_approval: true
    block_merge_always: true
    block_force_push_always: true

  shell:
    allowlist:
      - "mvn test"
      - "./mvnw test"
      - "gradle test"
      - "./gradlew test"
      - "pytest"
      - "npm test"
      - "pnpm test"
    block_unlisted: true
    block_destructive_patterns:
      - "rm -rf"
      - "del /s"
      - "format"
      - "sudo"
      - "curl | sh"
      - "wget | sh"

  secrets:
    block_output_values: true
    block_package_values: true
    block_logging: true

  packaging:
    require_manifest: true
    require_sha256: true
    block_path_traversal: true
    block_absolute_paths: true
    block_symlinks: true
    block_zip_bomb: true
    block_env_files: true
    block_browser_profiles: true
    block_credential_stores: true
