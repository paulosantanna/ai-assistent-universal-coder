default: deny

roles:
  root:
    capabilities:
      - READ_REPOSITORY
      - GENERATE_REPORT
      - GENERATE_EVIDENCE

  architect:
    capabilities:
      - READ_REPOSITORY
      - READ_FILES
      - DETECT_STACK
      - MAP_ARCHITECTURE
      - GENERATE_REPORT

  coder:
    capabilities:
      - READ_REPOSITORY
      - READ_FILES
      - GENERATE_PATCH
      - WRITE_SANDBOX_FILES

  tester:
    capabilities:
      - READ_REPOSITORY
      - READ_FILES
      - WRITE_SANDBOX_FILES
      - RUN_TESTS
      - GENERATE_REPORT

  security:
    capabilities:
      - READ_REPOSITORY
      - READ_FILES
      - SCAN_SECRETS
      - SCAN_DEPENDENCIES
      - GENERATE_REPORT

  devops:
    capabilities:
      - READ_REPOSITORY
      - READ_FILES
      - WRITE_SANDBOX_FILES
      - GENERATE_REPORT

  judge:
    capabilities:
      - READ_REPOSITORY
      - READ_FILES
      - GENERATE_REPORT
      - GENERATE_EVIDENCE
      - PACKAGE_VERIFY

approval_required:
  - filesystem.delete
  - filesystem.write_outside_sandbox
  - patch.apply
  - git.commit
  - git.push
  - git.merge
  - git.pr.create
  - shell.run
  - secrets.read
  - deploy.run
  - database.schema_change
  - package.extract_over_existing
