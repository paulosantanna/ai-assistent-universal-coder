[build-system]
requires = ["setuptools>=75", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "aeos-lsp"
version = "1.0.0"
description = "AEOS Language Server - Semantic intelligence for AEOS artifacts, governance, and runtime"
authors = [{ name = "AEOS Team" }]
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
keywords = ["aeos", "language-server", "lsp", "semantic-analysis"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Software Development :: Interpreters",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

dependencies = [
    "pygls==2.1.1",
    "lsprotocol==2025.0.0",
    "pyyaml>=6.0,<7.0",
    "pydantic>=2.0,<3.0",
    "tomli>=2.0,<3.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pytest-cov>=5.0",
    "pytest-timeout>=2.0",
    "ruff>=0.4",
    "mypy>=1.8",
    "jsonschema>=4.20",
    "sarif-tools>=2.0",
]
vscode = [
]

[project.scripts]
aeos-lsp = "aeos_lsp.__main__:main"

[project.entry-points."aeos.languageserver"]
aeos = "aeos_lsp"

[tool.setuptools.packages.find]
where = ["src"]
include = ["aeos_lsp*"]

[tool.ruff]
target-version = "py311"
line-length = 100
select = ["E", "F", "W", "I", "N", "UP", "SIM", "RUF100"]
ignore = ["E501", "SIM117"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = "-ra -v"
asyncio_mode = "auto"
timeout = 300

[tool.mypy]
strict = false
python_version = "3.11"
ignore_missing_imports = true
warn_unused_ignores = true
exclude = ["tests/"]
